<p>El 3 de Abril 2012, logramos la instalación de la Mesa de diálogo con el Instituto Guatemalteco de Seguridad Social -IGSS- para discutir una agenda sobre la cobertura del seguro social, a trabajadoras de la maquila, del hogar, campo y vendedoras por catálogo.</p>
